# Gibson — Local Development
# For Month 1, Supabase hosts PostgreSQL in the cloud.
# This compose file is for local dev/testing only.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gibson
      POSTGRES_USER: gibson
      POSTGRES_PASSWORD: gibson_dev
    ports:
      - "5432:5432"
    volumes:
      - gibson_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./db/seeds:/docker-entrypoint-initdb.d/seeds

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://gibson:gibson_dev@db:5432/gibson
      API_HOST: 0.0.0.0
      API_PORT: 8000
    depends_on:
      - db
    volumes:
      - ./api:/app/api
      - ./pwa:/app/pwa
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  gibson_data:
